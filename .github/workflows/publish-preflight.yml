name: Publish Preflight

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-preflight:
    name: Publish preflight (validation only)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify publish stop gates
        run: pnpm publish:preflight

      - name: Test
        run: pnpm test

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Run package smoke
        run: pnpm package:smoke

      - name: Re-verify publish stop gates and repository cleanliness
        run: pnpm publish:preflight
